syntax = "proto3";

option go_package = "github.com/gogu-x/gogs/pb/protoActivity";

import "activity/activity_common.proto";
import "common/error.proto";

message GetActivityListAck {
  repeated ActivityInfo activities = 1;
}

message JoinActivityAck {
  ErrCode code = 1;
  string  msg  = 2;
}

message GetProgressAck {
  ErrCode          code     = 1;
  ActivityProgress progress = 2;
}

message ClaimRewardAck {
  ErrCode code = 1;
  string  msg  = 2;
}
