syntax = "proto3";

option go_package = "github.com/gogu-x/gogs/pb/protoGuild";

import "guild/guild_common.proto";
import "common/error.proto";

message CreateGuildAck {
  ErrCode   code  = 1;
  string    msg   = 2;
  GuildInfo guild = 3;
}

message JoinGuildAck {
  ErrCode code = 1;
  string  msg  = 2;
}

message LeaveGuildAck {
  ErrCode code = 1;
  string  msg  = 2;
}

message GetGuildAck {
  ErrCode   code  = 1;
  GuildInfo guild = 2;
}
