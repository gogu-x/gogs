syntax = "proto3";

option go_package = "github.com/gogu-x/gogs/pb/gateway";

// 通用消息帧
message Frame {
  uint64 uid       = 1; // 玩家 ID（登录后有值）
  string server_id = 2; // 区服 ID
  uint64 conn_id   = 4; // 连接 ID（gate 层路由用）
  bytes  payload   = 5; // protobuf 序列化的消息体
  string msg_type  = 6; // 消息类型名（如 "LoginReq"），用于 game 层反序列化
}

service Gateway {
  rpc Stream(stream Frame) returns (stream Frame);
}


message LoginReq {
  uint64 uid       = 1;
  string token     = 2;
  int32  server_id = 3; // 玩家所在区服
}

message LoginResp {
  int32  code = 1;
  string msg  = 2;
}

message LogoutReq {
  uint64 uid = 1;
}

