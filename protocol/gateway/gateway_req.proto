syntax = "proto3";

option go_package = "github.com/gogu-x/gogs/pb/protoGateway";

message LoginReq {
  string account   = 1;
  string password  = 2;
  int32  server_id = 3;
}

message RegisterReq {
  string account   = 1;
  string password  = 2;
  int32  server_id = 3;
}

message LogoutReq {
  uint64 uid = 1;
}
